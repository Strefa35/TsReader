# Docker Compose for TsReader build environment
# Ubuntu 24.04 + wxWidgets 3.3.2 (built from source)
#
# Usage:
#   Build the builder image:    docker compose build
#   Compile TsReader:           docker compose run --rm build
#   Interactive shell:          docker compose run --rm shell

services:
  build:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tsreader-builder:wx332
    volumes:
      - ..:/workspace
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace
    command: >
      sh -c "BUILD_DIR=build;
             if [ -e \"$$BUILD_DIR\" ] && [ ! -w \"$$BUILD_DIR\" ]; then
               echo \"build is not writable for $(id -u):$(id -g), using build-user\";
               BUILD_DIR=build-user;
             fi;
             mkdir -p \"$$BUILD_DIR\" &&
             cd \"$$BUILD_DIR\" &&
             cmake .. &&
             make -j$(nproc)"

  shell:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: tsreader-builder:wx332
    volumes:
      - ..:/workspace
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: bash
